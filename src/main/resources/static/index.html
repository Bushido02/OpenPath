<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenPath - Карта Доступности</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100vh;
            width: 100%;
            z-index: 1; /* Карта на заднем фоне */
        }

        /* Стили для нашей новой кнопки геолокации */
        .locate-btn {
            position: absolute;
            bottom: 30px;
            right: 10px;
            z-index: 1000; /* Кнопка поверх карты */
            background-color: white;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            transition: 0.2s; /* Плавное изменение цвета при наведении */
        }

        /* Эффект при наведении мышки на кнопку */
        .locate-btn:hover {
            background-color: #f4f4f4;
        }
    </style>
</head>
    <script>
        // Регистрируем Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker зарегистрирован!', reg))
                    .catch(err => console.error('Ошибка Service Worker', err));
            });
        }
    </script>

<body>

<div id="map"></div>

<button class="locate-btn" id="locateMe">📍 Где я?</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Инициализация карты
    const map = L.map('map').setView([43.2389, 76.8897], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // --- ЗАГРУЗКА ДАННЫХ С СЕРВЕРА (API) ---
        fetch('/api/places')
            .then(response => response.json()) // Превращаем ответ сервера в JSON
            .then(places => {
                // Проходимся по каждому месту в списке
                places.forEach(place => {
                    // Формируем текст для всплывающего окна
                    let popupText = `<b>${place.name}</b><br>`;
                    popupText += place.hasRamp ? "✅ Есть пандус" : "❌ Нет пандуса";

                    // Добавляем маркер на карту
                    L.marker([place.lat, place.lng])
                        .addTo(map)
                        .bindPopup(popupText);
                });
            })
            .catch(error => console.error("Ошибка при загрузке мест:", error));

    // --- НОВАЯ ЛОГИКА ГЕОЛОКАЦИИ ---

    // Если локация успешно найдена:
    map.on('locationfound', function(e) {
        const radius = Math.round(e.accuracy / 2); // Точность определения в метрах

        // Ставим синий маркер на место пользователя
        L.marker(e.latlng).addTo(map)
            .bindPopup("Вы находитесь примерно здесь (точность: " + radius + " м)").openPopup();

        // Рисуем круг, показывающий радиус погрешности
        L.circle(e.latlng, radius).addTo(map);
    });

    // Если произошла ошибка (например, пользователь запретил доступ к GPS)
    map.on('locationerror', function(e) {
        alert("Не удалось определить местоположение. Пожалуйста, разрешите доступ к геоданным в браузере.");
    });

    // Подключаем действие к кнопке
    document.getElementById('locateMe').addEventListener('click', function() {
        // Команда Leaflet найти пользователя и приблизить карту (zoom: 16)
        map.locate({setView: true, maxZoom: 16});
    });
</script>

</body>
</html>

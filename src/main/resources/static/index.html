<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>OpenPath</title>

    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css"/>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
</head>
<body>
<div id="toast-container"></div>
<div id="map-picking-overlay" class="hidden-overlay">Выберите точку на карте</div>

<div class="wrapper">
    <div class="sidebar-nav">
        <div class="nav-tab active" data-target="panel-search"><span class="icon">🔍</span><span class="label">Поиск</span></div>
        <div class="nav-tab" data-target="panel-routes"><span class="icon">🛣️</span><span class="label">Маршрут</span></div>
        <div class="nav-tab" data-target="panel-profile"><span class="icon">⚙️</span><span class="label">Опции</span></div>
    </div>

    <div class="sidebar-content state-collapsed" id="sidebarContent">
        <div class="mobile-drag-handle" id="dragHandle"></div>

        <div id="panel-search" class="panel active">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-box" placeholder="Поиск (напр. Аптека)">
                <span class="mic-icon" id="micBtn">🎤</span>
            </div>
            <div class="quick-filters">
                <button class="chip-btn" data-query="Ресторан">🍽️ Еда</button>
                <button class="chip-btn" data-query="Аптека">💊 Аптека</button>
                <button class="chip-btn" data-query="Magnum">🛒 Magnum</button>
            </div>
            <div id="searchResultsList" class="results-list"></div>
        </div>

        <div id="panel-routes" class="panel">
            <h3>Маршрут</h3>
            <div class="route-tabs">
                <span class="r-tab active" data-mode="driving-car">🚗</span>
                <span class="r-tab" data-mode="foot-walking">🚶‍♂️</span>
                <span class="r-tab" data-mode="wheelchair" id="tabWheelchair" style="display: none;">♿</span>
            </div>
            <div class="route-input-group">
                <div class="swap-btn" id="swapBtn">⇅</div>
                <div class="route-point" id="startPointBtn">
                    <span class="point-icon a">A</span>
                    <input type="text" class="route-input" id="routeStart" placeholder="Мое местоположение" readonly>
                </div>
                <div class="route-point" id="endPointBtn">
                    <span class="point-icon b">B</span>
                    <input type="text" class="route-input" id="routeEnd" placeholder="Куда (Нажмите на карту)" readonly>
                </div>
            </div>
            <div class="route-result-box" id="routeResult">
                <p id="routeTime">-- мин</p>
                <p id="routeDist">-- км</p>
                <div class="action-buttons">
                    <button class="reset-btn" id="resetRouteBtn">Сброс</button>
                    <button class="start-nav-btn" id="startNavBtn">▶ В путь</button>
                </div>
            </div>
        </div>

        <div id="panel-profile" class="panel">
            <h3>Опции</h3>
            <div class="form-group">
                <label>Потребности</label>
                <label class="cb-label"><input type="checkbox" id="cb-wheelchair"> 👨‍🦽 Без ступеней</label>
                <label class="cb-label"><input type="checkbox" id="cb-vision"> 🦯 Слабовидящий (Голос)</label>
                <label class="cb-label"><input type="checkbox" id="cb-deaf"> 🧏 Для глухих</label>
            </div>
            <div class="form-group">
                <label>Тема карты</label>
                <select id="settingTheme" class="form-input">
                    <option value="light">Светлая</option>
                    <option value="dark">Темная</option>
                </select>
            </div>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
        <div class="map-controls-right" id="mapControls">
            <div class="map-fab sos-btn" id="sosBtn">SOS</div>
            <div class="map-fab" id="gpsBtn">🎯</div>
            <div class="map-fab" id="voiceBtn">🔊</div>
            <div class="map-btn-group" id="desktopZoom">
                <div class="map-btn" id="zoomInBtn">+</div>
                <div class="map-btn" id="zoomOutBtn">−</div>
                <div class="map-btn" id="btn3D" style="font-size:12px;">3D</div>
            </div>
        </div>
        <button class="stop-nav-btn" id="stopNavBtn">⏹ Завершить</button>
    </div>
</div>

<div class="mobile-bottom-nav">
    <div class="mob-nav-item active" data-target="panel-search"><span class="icon">🔍</span>Поиск</div>
    <div class="mob-nav-item" data-target="panel-routes"><span class="icon">🛣️</span>Маршрут</div>
    <div class="mob-nav-item" data-target="panel-profile"><span class="icon">⚙️</span>Опции</div>
</div>
</body>
</html>

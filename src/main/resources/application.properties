# Создаем локальный файл базы данных в папке проекта
spring.datasource.url=jdbc:h2:file:./data/openpathdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=

# Настройки для автоматического создания таблиц
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Включаем удобную панель, чтобы ты мог смотреть свои данные через браузер
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console